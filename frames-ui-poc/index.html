<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Frame Navigation</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            width: 320px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .title {
            font-size: 18px;
            color: #666;
            margin-bottom: 10px;
        }

        .frame {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            border-radius: 12px;
            margin-bottom: 20px;
            color: white;
            transition: all 0.3s ease;
        }

        .controls {
            display: flex;
            justify-content: space-between;
        }

        button {
            flex: 1;
            padding: 12px;
            margin: 5px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #prevBtn {
            background: #e2e8f0;
        }

        #nextBtn {
            background: #667eea;
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

<div class="card">
    <div class="title">Frame Navigator</div>
    <div id="frame" class="frame"></div>

    <div class="controls">
        <button id="prevBtn">← Prev</button>
        <button id="nextBtn">Next →</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
